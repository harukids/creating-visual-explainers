              hover: '#F1F5F9',
              border: '#E2E8F0',

              text: '#1E293B',

              dim: '#94A3B8',

<!-- LIBRARY_ITEMS -->
    </div>

        <div class="bg-ads-surface rounded-lg px-4 py-2.5">「API とは何か、図解して」</div>
